<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-2 Spirit 隐形轰炸机 - 飞行模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #00ff00;
        }
        
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            cursor: crosshair;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 20, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            pointer-events: none;
        }
        
        #ui h1 {
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .control-info {
            font-size: 12px;
            line-height: 1.8;
            opacity: 0.9;
        }
        
        .key {
            display: inline-block;
            background: #003300;
            border: 1px solid #00ff00;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
            font-weight: bold;
            color: #00ff00;
        }
        
        #speedometer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        
        #speedValue {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }
        
        #speedLabel {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        #radar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 50%;
            overflow: hidden;
        }
        
        #radar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.3);
            transform: translate(-50%, -50%);
        }
        
        #radar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(0, 255, 0, 0.3);
            transform: translate(-50%, -50%);
        }
        
        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00ff00);
            transform-origin: left center;
            animation: sweep 4s linear infinite;
        }
        
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .radar-blip {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        
        #altitude {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
            text-align: right;
        }
        
        #altitudeValue {
            font-size: 20px;
            font-weight: bold;
        }
        
        #stealthMode {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #00ff00;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
        
        #stealthMode.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .stealth-text {
            font-size: 24px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <h1>⚡ B-2 Spirit 控制系统 ⚡</h1>
        <div class="control-info">
            <div><span class="key">↑</span> / <span class="key">W</span> 加速推进</div>
            <div><span class="key">↓</span> / <span class="key">S</span> 减速/刹车</div>
            <div><span class="key">←</span> / <span class="key">A</span> 左转</div>
            <div><span class="key">→</span> / <span class="key">D</span> 右转</div>
            <div><span class="key">SPACE</span> 开启隐形模式</div>
            <div><span class="key">SHIFT</span> 加力燃烧</div>
        </div>
    </div>
    
    <div id="speedometer">
        <div id="speedValue">0</div>
        <div id="speedLabel">KNOTS</div>
    </div>
    
    <div id="altitude">
        <div>ALTITUDE</div>
        <div id="altitudeValue">35,000</div>
        <div style="font-size: 10px; opacity: 0.7;">FEET</div>
    </div>
    
    <div id="radar">
        <div class="radar-sweep"></div>
        <div class="radar-blip" style="top: 30%; left: 60%;"></div>
        <div class="radar-blip" style="top: 70%; left: 40%; animation-delay: 1s;"></div>
    </div>
    
    <div id="stealthMode">
        <div class="stealth-text">🛡️ 隐形模式激活</div>
        <div style="font-size: 12px; opacity: 0.8;">雷达反射截面积: 0.0001 m²</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 游戏状态
        const game = {
            keys: {},
            clouds: [],
            particles: [],
            stars: [],
            lastTime: 0
        };
        
        // B-2轰炸机对象
        const b2 = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0,
            vy: 0,
            angle: 0,
            speed: 0,
            maxSpeed: 15,
            acceleration: 0.2,
            friction: 0.98,
            rotationSpeed: 0.05,
            stealth: false,
            afterburner: false,
            altitude: 35000,
            engineGlow: 0
        };
        
        // 初始化云朵
        for (let i = 0; i < 20; i++) {
            game.clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 100 + 50,
                speed: Math.random() * 2 + 1,
                opacity: Math.random() * 0.3 + 0.1
            });
        }
        
        // 初始化星星（高空效果）
        for (let i = 0; i < 100; i++) {
            game.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.6,
                size: Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2
            });
        }
        
        // 键盘事件
        window.addEventListener('keydown', (e) => {
            game.keys[e.code] = true;
            
            if (e.code === 'Space') {
                e.preventDefault();
                b2.stealth = !b2.stealth;
                document.getElementById('stealthMode').classList.toggle('active', b2.stealth);
            }
        });
        
        window.addEventListener('keyup', (e) => {
            game.keys[e.code] = false;
        });
        
        // 绘制B-2轰炸机
        function drawB2(x, y, angle, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.scale(scale, scale);
            
            // 隐形模式效果
            if (b2.stealth) {
                ctx.globalAlpha = 0.4;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff00';
            } else {
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
            }
            
            // 机身主体 - 飞翼布局
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            // 左翼
            ctx.moveTo(0, -80);
            ctx.lineTo(-120, 20);
            ctx.lineTo(-100, 40);
            ctx.lineTo(-40, 30);
            // 机身中部
            ctx.lineTo(0, 50);
            ctx.lineTo(40, 30);
            // 右翼
            ctx.lineTo(100, 40);
            ctx.lineTo(120, 20);
            ctx.lineTo(0, -80);
            ctx.closePath();
            ctx.fill();
            
            // 机身细节 - 锯齿状后缘（隐形设计特征）
            ctx.fillStyle = '#0f0f0f';
            ctx.beginPath();
            ctx.moveTo(-100, 40);
            ctx.lineTo(-80, 35);
            ctx.lineTo(-60, 42);
            ctx.lineTo(-40, 30);
            ctx.lineTo(-20, 38);
            ctx.lineTo(0, 35);
            ctx.lineTo(20, 38);
            ctx.lineTo(40, 30);
            ctx.lineTo(60, 42);
            ctx.lineTo(80, 35);
            ctx.lineTo(100, 40);
            ctx.lineTo(0, 50);
            ctx.closePath();
            ctx.fill();
            
            // 驾驶舱
            ctx.fillStyle = '#2a2a2a';
            ctx.beginPath();
            ctx.ellipse(0, -20, 8, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 驾驶舱窗户
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.ellipse(0, -20, 5, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 发动机喷口（4个）
            const engineOffset = [-60, -20, 20, 60];
            engineOffset.forEach((offset, i) => {
                ctx.fillStyle = '#0a0a0a';
                ctx.beginPath();
                ctx.ellipse(offset, 35, 8, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 引擎发光效果
                if (b2.speed > 0.1) {
                    const glowIntensity = b2.afterburner ? 1 : (b2.speed / b2.maxSpeed) * 0.6;
                    ctx.fillStyle = `rgba(255, ${100 + b2.engineGlow}, 0, ${glowIntensity})`;
                    ctx.beginPath();
                    ctx.ellipse(offset, 38, 6, 10 + b2.engineGlow * 0.1, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 加力燃烧效果
                    if (b2.afterburner) {
                        ctx.fillStyle = 'rgba(100, 150, 255, 0.6)';
                        ctx.beginPath();
                        ctx.moveTo(offset - 5, 40);
                        ctx.lineTo(offset, 70 + Math.random() * 20);
                        ctx.lineTo(offset + 5, 40);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            });
            
            // 隐形涂层细节线
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-80, 0);
            ctx.lineTo(80, 0);
            ctx.moveTo(-60, -30);
            ctx.lineTo(60, -30);
            ctx.stroke();
            
            // 美国空军标志（简化版）
            if (!b2.stealth) {
                ctx.fillStyle = '#ffffff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('AF', 0, 10);
            }
            
            ctx.restore();
        }
        
        // 绘制云朵
        function drawClouds() {
            game.clouds.forEach(cloud => {
                ctx.save();
                ctx.globalAlpha = cloud.opacity;
                const gradient = ctx.createRadialGradient(
                    cloud.x, cloud.y, 0,
                    cloud.x, cloud.y, cloud.size
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 绘制星星
        function drawStars() {
            game.stars.forEach(star => {
                ctx.save();
                const twinkle = Math.sin(Date.now() * 0.003 + star.twinkle) * 0.5 + 0.5;
                ctx.globalAlpha = twinkle * 0.8;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // 更新游戏逻辑
        function update() {
            // 处理输入
            if (game.keys['ArrowUp'] || game.keys['KeyW']) {
                b2.speed += b2.acceleration;
                if (b2.speed > b2.maxSpeed) b2.speed = b2.maxSpeed;
            }
            if (game.keys['ArrowDown'] || game.keys['KeyS']) {
                b2.speed -= b2.acceleration * 2;
                if (b2.speed < 0) b2.speed = 0;
            }
            if (game.keys['ArrowLeft'] || game.keys['KeyA']) {
                b2.angle -= b2.rotationSpeed * (b2.speed / b2.maxSpeed + 0.2);
            }
            if (game.keys['ArrowRight'] || game.keys['KeyD']) {
                b2.angle += b2.rotationSpeed * (b2.speed / b2.maxSpeed + 0.2);
            }
            if (game.keys['ShiftLeft'] || game.keys['ShiftRight']) {
                b2.afterburner = true;
                b2.maxSpeed = 25;
            } else {
                b2.afterburner = false;
                b2.maxSpeed = 15;
                if (b2.speed > 15) b2.speed *= 0.98;
            }
            
            // 摩擦力
            b2.speed *= b2.friction;
            
            // 计算速度向量
            b2.vx = Math.sin(b2.angle) * b2.speed;
            b2.vy = -Math.cos(b2.angle) * b2.speed;
            
            // 更新位置
            b2.x += b2.vx;
            b2.y += b2.vy;
            
            // 边界处理（环绕）
            if (b2.x < -100) b2.x = canvas.width + 100;
            if (b2.x > canvas.width + 100) b2.x = -100;
            if (b2.y < -100) b2.y = canvas.height + 100;
            if (b2.y > canvas.height + 100) b2.y = -100;
            
            // 更新引擎发光动画
            b2.engineGlow = Math.sin(Date.now() * 0.01) * 10 + 20;
            
            // 更新云朵位置（视差效果）
            game.clouds.forEach(cloud => {
                cloud.x -= cloud.speed + b2.vx * 0.1;
                cloud.y -= b2.vy * 0.1;
                
                if (cloud.x < -cloud.size) cloud.x = canvas.width + cloud.size;
                if (cloud.x > canvas.width + cloud.size) cloud.x = -cloud.size;
                if (cloud.y < -cloud.size) cloud.y = canvas.height + cloud.size;
                if (cloud.y > canvas.height + cloud.size) cloud.y = -cloud.size;
            });
            
            // 更新星星（更慢的视差）
            game.stars.forEach(star => {
                star.x -= b2.vx * 0.02;
                star.y -= b2.vy * 0.02;
                
                if (star.x < 0) star.x = canvas.width;
                if (star.x > canvas.width) star.x = 0;
                if (star.y < 0) star.y = canvas.height * 0.6;
                if (star.y > canvas.height * 0.6) star.y = 0;
            });
            
            // 生成引擎粒子
            if (b2.speed > 1 && !b2.stealth) {
                for (let i = 0; i < 2; i++) {
                    game.particles.push({
                        x: b2.x - Math.sin(b2.angle) * 40 + (Math.random() - 0.5) * 60,
                        y: b2.y + Math.cos(b2.angle) * 40 + (Math.random() - 0.5) * 20,
                        vx: -b2.vx * 0.5 + (Math.random() - 0.5) * 2,
                        vy: -b2.vy * 0.5 + (Math.random() - 0.5) * 2,
                        life: 1,
                        color: b2.afterburner ? '255, 100, 50' : '200, 200, 255'
                    });
                }
            }
            
            // 更新粒子
            game.particles = game.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                return p.life > 0;
            });
            
            // 更新UI
            document.getElementById('speedValue').textContent = Math.floor(b2.speed * 40);
            document.getElementById('altitudeValue').textContent = Math.floor(b2.altitude + Math.sin(Date.now() * 0.001) * 100);
        }
        
        // 渲染
        function render() {
            // 清空画布
            ctx.fillStyle = 'rgba(15, 32, 39, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f2027');
            gradient.addColorStop(0.5, '#203a43');
            gradient.addColorStop(1, '#2c5364');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制星星
            drawStars();
            
            // 绘制云层
            drawClouds();
            
            // 绘制粒子轨迹
            game.particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life * 0.5;
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            
            // 绘制B-2（如果隐形模式开启，添加闪烁效果）
            if (b2.stealth && Math.sin(Date.now() * 0.01) > 0) {
                ctx.save();
                ctx.globalAlpha = 0.3;
            }
            
            drawB2(b2.x, b2.y, b2.angle);
            
            if (b2.stealth && Math.sin(Date.now() * 0.01) > 0) {
                ctx.restore();
            }
            
            // 绘制隐形模式的扫描线效果
            if (b2.stealth) {
                ctx.save();
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(b2.x - 100, b2.y);
                ctx.lineTo(b2.x + 100, b2.y);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // 启动游戏
        gameLoop();
        
        // 初始提示
        setTimeout(() => {
            console.log('B-2 Spirit 控制系统已就绪');
        }, 1000);
    </script>
</body>
</html>
