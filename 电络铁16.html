    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 微软雅黑, Arial, sans-serif;

        /* ======================
           1:1 纯CSS手绘电路图背景
           ====================== */
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #ffffff;
            overflow: hidden;
            /* 关键：始终显示鼠标光标，不隐藏 */
            cursor: default;
            border: 2px solid #000;
        }

        /* 所有电路元素使用绝对定位，1:1 复刻 */
        .circuit-element {
            position: absolute;
        }

        /* 顶部 IC3 */
        #ic3 {
            top: 10px;
            left: 200px;
            width: 500px;
            height: 120px;
            background: #fff;
            border: 3px solid #000;
        }
        #ic3::before {
            content: "IC3";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
        }
        /* IC3 引脚 */
        .ic3-pin {
            position: absolute;
            bottom: -15px;
            width: 10px;
            height: 15px;
            background: #000;
        }
        .ic3-pin:nth-child(1) { left: 50px; }  /* V+ */
        .ic3-pin:nth-child(2) { left: 110px; } /* GND */
        .ic3-pin:nth-child(3) { left: 170px; } /* C01 */
        .ic3-pin:nth-child(4) { left: 230px; } /* C02 */
        .ic3-pin:nth-child(5) { left: 290px; } /* T1 */
        .ic3-pin:nth-child(6) { left: 350px; } /* T2 */
        .ic3-pin:nth-child(7) { left: 410px; } /* CP */
        .ic3-pin:nth-child(8) { left: 470px; } /* Nc */
        /* IC3 引脚标签 */
        .ic3-label {
            position: absolute;
            bottom: -35px;
            font-size: 14px;
        }
        .ic3-label:nth-child(1) { left: 40px;  content: "V+"; }
        .ic3-label:nth-child(2) { left: 100px; content: "GND"; }
        .ic3-label:nth-child(3) { left: 160px; content: "C01"; }
        .ic3-label:nth-child(4) { left: 220px; content: "C02"; }
        .ic3-label:nth-child(5) { left: 280px; content: "T1"; }
        .ic3-label:nth-child(6) { left: 340px; content: "T2"; }
        .ic3-label:nth-child(7) { left: 400px; content: "CP"; }
        .ic3-label:nth-child(8) { left: 460px; content: "Nc"; }

        /* ======================
           游戏功能部分（优化鼠标体验）
           ====================== */

        /* 手绘电烙铁（握笔倾斜+尖头）- 关键优化：偏移显示，不挡光标 */
        #soldering-iron {
            position: absolute;
            width: 40px;
            height: 120px;
            background: linear-gradient(to right, #888888, #aaaaaa, #888888);
            border-radius: 8px 8px 2px 2px;
            transform-origin: bottom center;
            transform: rotate(-30deg) scale(0.98);
            box-shadow: 2px 2px 3px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 99; /* 低于光标层级 */
            /* 电烙铁偏移：鼠标在烙铁头位置，烙铁本体在鼠标左上方，不遮挡 */
            margin-left: -30px;
            margin-top: -80px;
        }

        /* 更尖的手绘烙铁头 */
        #iron-tip {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 26px;
            background: linear-gradient(to bottom, #0066ff 0%, #0066ff 80%, #0044bb 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-radius: 1px;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
            /* 烙铁头精准对齐鼠标位置 */
            z-index: 100;
        }
        #iron-tip.hot {
            background: linear-gradient(to bottom, #ff2222 0%, #ff2222 80%, #aa0000 100%);
            box-shadow: 0 0 12px #ff0000, 0 0 25px rgba(255,0,0,0.5);
        }
        /* 新增：烙铁头对准焊点时高亮提示 */
        #iron-tip.aiming {
            box-shadow: 0 0 15px #ffff00, 0 0 25px rgba(255,255,0,0.8);
        }

        /* 加热进度条（手绘风格） */
        #heat-progress-container {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 6px;
            background: #eeeeee;
            border: 1px solid #999;
            border-radius: 3px;
            overflow: hidden;
            display: none;
            z-index: 101;
        }
        #heat-progress-bar {
            height: 100%;
            width: 0%;
            background: #0066ff;
            background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.3) 50%);
            background-size: 10px 10px;
        }

        /* 手绘焊点样式 - 新增：未焊接焊点增加明显标识 */
        .solder-point {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(45deg, #aaaaaa, #cccccc);
            border: 2px solid #777777;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            /* 未焊接焊点增加外圈高亮，更容易识别 */
            box-shadow: 0 0 0 2px rgba(255, 153, 0, 0.5), 1px 1px 2px rgba(0,0,0,0.2);
            z-index: 10;
        }
        /* 已焊接焊点样式弱化，减少视觉干扰 */
        .solder-point.melted { 
            background: linear-gradient(45deg, #66ff66, #88ff88); 
            border-color: #33aa33; 
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .progress-container {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 6px;
            background: #eeeeee;
            border: 1px solid #999;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffcc00;
            background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.4) 50%);
            background-size: 8px 8px;
        }
        .solder-point.melting .progress-container { display: block; }

        /* 火花特效（手绘风格） */
        #spark-container { position: absolute; pointer-events: none; z-index: 105; }
        .spark {
            position: absolute;
            width: 2px; 
            height: 2px;
            background: #ffcc00;
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(0.5px);
        }

        /* UI面板（手绘风格） */
        #ui-panel {
            position: absolute;
            top: 10px; left: 10px;
            color: #333333;
            font-size: 16px;
            text-shadow: 1px 1px 0px #ffffff;
            z-index: 200;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border: 1px solid #999;
            border-radius: 4px;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #333;
            z-index: 9999;
            border: 2px solid #333;
        }
        #game-over-screen { display: none; }
        button {
            padding: 14px 28px;
            font-size: 18px;
            background: linear-gradient(to bottom, #ff6600, #ff3300);
            border: 2px solid #cc3300;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.2);
        }
        button:hover { 
            background: linear-gradient(to bottom, #ff8800, #ff5500);
            transform: translate(-1px, -1px);
        }
        #tip-text {
            position: absolute;
            bottom: 15px; left: 15px;
            color: #333;
            font-size: 14px;
            text-shadow: 1px 1px 0px #ffffff;
            z-index: 200;
            background: rgba(255,255,255,0.8);
            padding: 4px 8px;
            border: 1px solid #999;
            border-radius: 4px;
        }
    </style>
</head>

    <div id="trace1" class="trace"></div>

    <!-- 游戏功能元素 -->
    <div id="spark-container"></div>
    <div id="start-screen">
        <h1 style="margin-bottom: 10px; text-shadow: 1px 1px 0px #ddd;">PCB 工程师焊接训练</h1>
        <p style="margin:10px 0; text-shadow: 1px 1px 0px #ddd;">长按加热 · 对准焊点 · 焊接出火花</p>
        <button id="start-btn">开始训练</button>
    </div>
    <div id="game-over-screen">
        <h1 id="game-over-text" style="text-shadow: 1px 1px 0px #ddd;"></h1>
        <p id="score-text" style="margin:10px 0; text-shadow: 1px 1px 0px #ddd;"></p>
        <button id="restart-btn">重新训练</button>
    </div>
    <div id="soldering-iron">
        <div id="iron-tip"></div>
        <div id="heat-progress-container"><div id="heat-progress-bar"></div></div>
    </div>
    <div id="ui-panel">
        <div>时间：<span id="time-left">60</span>s</div>
        <div>完成：<span id="completed-points">0</span>/<span id="total-points">0</span></div>
    </div>
    <div id="tip-text">长按左键加热 | 烙铁尖对准焊点中心（黄色高亮=对准）</div>
</div>

<script>
    const game = {
        isPlaying: false,
        timeLeft: 60,
        totalPoints: 0,
        completedPoints: 0,
        isIronHot: false,
        heatProgressInterval: null,
        timerInterval: null,
        progressInterval: null,
        currentProgressPoint: null,
        sparkInterval: null
    };

    const $ = s => document.querySelector(s);

    // 初始化手绘焊点
    function initSolderPoints() {
        document.querySelectorAll('.solder-point').forEach(p => p.remove());
        game.totalPoints = Math.floor(Math.random() * 4) + 8;
        $('#total-points').textContent = game.totalPoints;
        for (let i = 0; i < game.totalPoints; i++) {
            const point = document.createElement('div');
            point.className = 'solder-point';
            // 焊点位置分布在电路图关键节点
            const positions = [
                {x: 270, y: 130}, {x: 270, y: 230}, {x: 410, y: 130}, {x: 410, y: 230},
                {x: 300, y: 400}, {x: 450, y: 400}, {x: 570, y: 400}, {x: 600, y: 350},
                {x: 720, y: 430}, {x: 720, y: 530}, {x: 270, y: 350}, {x: 410, y: 350}
            ];
            const pos = positions[i % positions.length];
            point.style.left = (pos.x - 12) + 'px';
            point.style.top = (pos.y - 12) + 'px';
            point.dataset.x = pos.x;
            point.dataset.y = pos.y;
            const prog = document.createElement('div');
            prog.className = 'progress-container';
            const bar = document.createElement('div');
            bar.className = 'progress-bar';
            prog.appendChild(bar);
            point.appendChild(prog);
            $('#game-container').appendChild(point);
        }
    }

    // 电烙铁跟随鼠标（握笔姿势）- 优化：鼠标位置精准对应烙铁头
    $('#game-container').addEventListener('mousemove', e => {
        if (!game.isPlaying) return;
        const r = $('#game-container').getBoundingClientRect();
        const tx = e.clientX - r.left;
        const ty = e.clientY - r.top;
        const iron = $('#soldering-iron');
        // 烙铁头精准对齐鼠标坐标，本体偏移显示
        iron.style.left = tx + 'px';
        iron.style.top = ty + 'px';
        
        // 检测是否对准焊点，增加高亮提示
        const ironTip = $('#iron-tip');
        const points = document.querySelectorAll('.solder-point:not(.melted)');
        const mx = tx;
        const my = ty;
        let isAiming = false;
        
        for (const p of points) {
            const px = parseFloat(p.dataset.x);
            const py = parseFloat(p.dataset.y);
            const d = Math.hypot(mx - px, my - py);
            if (d < 9) {
                isAiming = true;
                break;
            }
        }
        
        if (isAiming && game.isIronHot) {
            ironTip.classList.add('aiming');
        } else {
            ironTip.classList.remove('aiming');
        }
    });

    // 长按加热逻辑
    $('#game-container').addEventListener('mousedown', e => {
        if (e.button !== 0 || !game.isPlaying) return;
        const c = $('#heat-progress-container');
        const b = $('#heat-progress-bar');
        c.style.display = 'block';
        b.style.width = '0%';
        let hp = 0;
        game.heatProgressInterval = setInterval(() => {
            hp += 2;
            b.style.width = hp + '%';
            if (hp >= 100) {
                clearInterval(game.heatProgressInterval);
                game.isIronHot = true;
                $('#iron-tip').classList.add('hot');
            }
        }, 20);
    });

    // 松开左键停止加热
    $('#game-container').addEventListener('mouseup', e => {
        if (e.button !== 0) return;
        clearInterval(game.heatProgressInterval);
        $('#heat-progress-container').style.display = 'none';
        game.isIronHot = false;
        $('#iron-tip').classList.remove('hot');
        $('#iron-tip').classList.remove('aiming'); // 移除高亮
        stopWelding();
        stopSparks();
    });

    // 鼠标移出停止加热
    $('#game-container').addEventListener('mouseleave', () => {
        clearInterval(game.heatProgressInterval);
        $('#heat-progress-container').style.display = 'none';
        game.isIronHot = false;
        $('#iron-tip').classList.remove('hot');
        $('#iron-tip').classList.remove('aiming'); // 移除高亮
        stopWelding();
        stopSparks();
    });

    // 检测焊点对准（手绘精度）
    setInterval(() => {
        if (!game.isPlaying || !game.isIronHot) return;
        const points = document.querySelectorAll('.solder-point:not(.melted)');
        const iron = $('#soldering-iron');
        const mx = parseFloat(iron.style.left);
        const my = parseFloat(iron.style.top);
        for (const p of points) {
            const px = parseFloat(p.dataset.x);
            const py = parseFloat(p.dataset.y);
            const d = Math.hypot(mx - px, my - py);
            if (d < 9) {
                if (game.currentProgressPoint !== p) {
                    startWelding(p);
                    startSparks(px, py);
                }
                return;
            }
        }
        stopWelding();
        stopSparks();
    }, 50);

    // 开始焊接
    function startWelding(point) {
        if (game.currentProgressPoint) return;
        game.currentProgressPoint = point;
        point.classList.add('melting');
        const bar = point.querySelector('.progress-bar');
        let p = 0;
        game.progressInterval = setInterval(() => {
            p += 4;
            bar.style.width = p + '%';
            if (p >= 100) {
                clearInterval(game.progressInterval);
                point.classList.remove('melting');
                point.classList.add('melted');
                game.completedPoints++;
                $('#completed-points').textContent = game.completedPoints;
                game.currentProgressPoint = null;
                stopSparks();
                if (game.completedPoints === game.totalPoints) endGame(true);
            }
        }, 30);
    }

    // 停止焊接
    function stopWelding() {
        if (game.currentProgressPoint) {
            clearInterval(game.progressInterval);
            game.currentProgressPoint.classList.remove('melting');
            game.currentProgressPoint = null;
        }
    }

    // 手绘风格火花特效
    function startSparks(x, y) {
        stopSparks();
        game.sparkInterval = setInterval(() => {
            const cnt = $('#spark-container');
            for (let i = 0; i < 6; i++) {
                const sp = document.createElement('div');
                sp.className = 'spark';
                const px = x + Math.random() * 12 - 6;
                const py = y + Math.random() * 12 - 6;
                sp.style.left = px + 'px';
                sp.style.top = py + 'px';
                const colors = ['#ffcc00', '#ff9900', '#ff5500'];
                sp.style.background = colors[Math.floor(Math.random() * 3)];
                const s = Math.random() * 2 + 1;
                sp.style.width = s + 'px';
                sp.style.height = s + 'px';
                cnt.appendChild(sp);

                let vx = Math.random() * 4 - 2 + (Math.random() * 0.5);
                let vy = Math.random() * 4 - 2 + (Math.random() * 0.5);
                let op = 0.9;

                function updateSpark() {
                    vx *= 0.94 + (Math.random() * 0.02);
                    vy *= 0.94 + (Math.random() * 0.02);
                    op -= 0.04 + (Math.random() * 0.01);
                    
                    sp.style.left = (parseFloat(sp.style.left) + vx) + 'px';
                    sp.style.top = (parseFloat(sp.style.top) + vy) + 'px';
                    sp.style.opacity = op;
                    
                    if (op > 0) requestAnimationFrame(updateSpark);
                    else sp.remove();
                }
                requestAnimationFrame(updateSpark);
            }
        }, 60);
    }

    // 停止火花
    function stopSparks() {
        clearInterval(game.sparkInterval);
        $('#spark-container').innerHTML = '';
    }

    // 开始游戏
    function startGame() {
        game.isPlaying = true;
        game.timeLeft = 60;
        game.completedPoints = 0;
        game.isIronHot = false;
        $('#iron-tip').classList.remove('hot');
        $('#iron-tip').classList.remove('aiming');
        $('#heat-progress-container').style.display = 'none';
        $('#start-screen').style.display = 'none';
        $('#game-over-screen').style.display = 'none';
        $('#completed-points').textContent = 0;
        initSolderPoints();
        game.timerInterval = setInterval(() => {
            game.timeLeft--;
            $('#time-left').textContent = game.timeLeft;
            if (game.timeLeft <= 0) endGame(false);
        }, 1000);
    }

    // 结束游戏（通关文案）
    function endGame(win) {
        game.isPlaying = false;
        clearInterval(game.timerInterval);
        clearInterval(game.heatProgressInterval);
        clearInterval(game.progressInterval);
        stopSparks();
        $('#game-over-screen').style.display = 'flex';
        if (win) {
            $('#game-over-text').textContent = '恭喜通关，离成为PCB工程师又进了一步！';
            $('#score-text').textContent = `完美完成 ${game.completedPoints}/${game.totalPoints} 个焊点`;
        } else {
            $('#game-over-text').textContent = '时间到！';
            $('#score-text').textContent = `完成 ${game.completedPoints}/${game.totalPoints} 个焊点，继续加油！`;
        }
    }

    // 绑定按钮事件
    $('#start-btn').onclick = startGame;
    $('#restart-btn').onclick = startGame;
</script>
